name: ATS QA Product Agent - Phase 1

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Live ATS URL to test"
        required: false
        default: "https://karm-ats-web.azurewebsites.net"
      test_prefix:
        description: "Only create or touch records with this prefix"
        required: false
        default: "TEST_"

concurrency:
  group: ats-qa-product-agent-phase1
  cancel-in-progress: false

jobs:
  qa:
    name: Playwright live ATS QA
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ATS_BASE_URL: ${{ inputs.base_url }}
      ATS_TEST_PREFIX: ${{ inputs.test_prefix }}
      ATS_AUTH_MODE: ${{ vars.ATS_AUTH_MODE || 'qa-login' }}
      ATS_API_BASE_URL: ${{ vars.ATS_API_BASE_URL || secrets.ATS_API_BASE_URL }}
      ATS_QA_LOGIN_ENABLED: ${{ vars.ATS_QA_LOGIN_ENABLED || secrets.ATS_QA_LOGIN_ENABLED || 'true' }}
      ATS_QA_LOGIN_SECRET: ${{ secrets.ATS_QA_LOGIN_SECRET }}
      ATS_TEST_EMAIL: ${{ secrets.ATS_TEST_EMAIL }}
      ATS_TEST_PASSWORD: ${{ secrets.ATS_TEST_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: react-ats-preview/package-lock.json

      - name: Install frontend dependencies
        working-directory: react-ats-preview
        run: npm ci

      - name: Install Playwright browser
        working-directory: react-ats-preview
        run: npx playwright install --with-deps chromium

      - name: Run live ATS QA tests
        id: qa-tests
        continue-on-error: true
        working-directory: react-ats-preview
        run: npm run qa:e2e

      - name: Generate structured QA bug summary
        if: always()
        working-directory: react-ats-preview
        run: npm run qa:e2e:summary

      - name: Publish QA summary
        if: always()
        run: |
          if [ -n "$ATS_API_BASE_URL" ]; then api_configured="yes"; else api_configured="no"; fi
          if [ -n "$ATS_QA_LOGIN_SECRET" ]; then qa_secret_configured="yes"; else qa_secret_configured="no"; fi
          if [ -n "$ATS_TEST_EMAIL" ]; then ms_email_configured="yes"; else ms_email_configured="no"; fi
          if [ -n "$ATS_TEST_PASSWORD" ]; then ms_password_configured="yes"; else ms_password_configured="no"; fi
          {
            echo "## ATS QA Product Agent - Phase 1"
            echo ""
            echo "- Target: $ATS_BASE_URL"
            echo "- Test record prefix: $ATS_TEST_PREFIX"
            echo "- Auth mode requested: ${ATS_AUTH_MODE:-not set}"
            echo "- Temporary QA login enabled: ${ATS_QA_LOGIN_ENABLED:-false}"
            echo "- API base configured: $api_configured"
            echo "- QA login secret configured: $qa_secret_configured"
            echo "- Microsoft test email configured: $ms_email_configured"
            echo "- Microsoft test password configured: $ms_password_configured"
            echo "- Database reset: not performed"
            echo "- Demo seed: not performed"
            echo "- Artifacts: Playwright HTML report, screenshots, videos, traces, JSON, and JUnit are uploaded below."
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f react-ats-preview/test-results/qa-bug-summary.md ]; then
            cat react-ats-preview/test-results/qa-bug-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Structured QA bug summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ats-playwright-html-report
          path: react-ats-preview/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ats-playwright-test-results
          path: react-ats-preview/test-results
          if-no-files-found: ignore

      - name: Fail workflow if live QA failed
        if: always() && steps.qa-tests.outcome == 'failure'
        run: exit 1
